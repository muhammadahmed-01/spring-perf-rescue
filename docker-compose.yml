services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: perf_lab
      POSTGRES_USER: perf
      POSTGRES_PASSWORD: perf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perf -d perf_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/perf_lab
      SPRING_DATASOURCE_USERNAME: perf
      SPRING_DATASOURCE_PASSWORD: perf
      APP_SEED_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
